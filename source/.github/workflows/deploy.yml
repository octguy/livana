name: Build & Deploy

on:
  push:
    branches: [ main ]

# Prevent multiple concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─── Job 1: Backend CI ──────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('livana-be/**/*.gradle*', 'livana-be/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build & Test
        working-directory: livana-be
        run: ./gradlew build --no-daemon

  # ─── Job 2: Frontend CI ─────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: livana-fe/package-lock.json

      - name: Install dependencies
        working-directory: livana-fe
        run: npm ci

      - name: Lint
        working-directory: livana-fe
        run: npm run lint

      - name: Build
        working-directory: livana-fe
        env:
          VITE_API_URL: http://localhost:8080
        run: npm run build

  # ─── Job 3: Build & Push Docker Images ─────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci ]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./livana-be
          file: ./livana-be/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/livana-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./livana-fe
          file: ./livana-fe/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/livana-fe:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Deploy to VPS ───────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [ docker-build-push ]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/livana

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \
              -u ${{ secrets.VPS_GITHUB_USER }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
