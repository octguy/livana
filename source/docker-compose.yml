services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: livana-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: livana
      POSTGRES_USER: livana-user
      POSTGRES_PASSWORD: livana-pass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livana-user -d livana"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: livana-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"        # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot backend ─────────────────────────────────────────────────────
  livana-be:
    build:
      context: ./livana-be
      dockerfile: Dockerfile
    container_name: livana-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: ./livana-be/.env        # loads all secrets from .env into the container
    environment:
      # Override .env values that must point to container names, not localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/livana
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    ports:
      - "8080:8080"

  # ─── React frontend (nginx) ──────────────────────────────────────────────────
  livana-fe:
    build:
      context: ./livana-fe
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: livana-fe
    restart: unless-stopped
    depends_on:
      - livana-be
    ports:
      - "5173:80"

volumes:
  db_data:
  rabbitmq_data:
