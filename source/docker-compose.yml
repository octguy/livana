services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: livana-db
    restart: unless-stopped
    env_file: ./livana-be/.env        # provides SPRING_DATASOURCE_USERNAME/PASSWORD
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-livana}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-octguy}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d ${POSTGRES_DB:-livana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: livana-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot backend ─────────────────────────────────────────────────────
  livana-be:
    build:
      context: ./livana-be
      dockerfile: Dockerfile
    container_name: livana-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: ./livana-be/.env        # loads all secrets from .env into the container
    environment:
      # Override .env values that must point to container names, not localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-livana}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  # ─── React frontend (nginx) ──────────────────────────────────────────────────
  livana-fe:
    build:
      context: ./livana-fe
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: livana-fe
    restart: unless-stopped
    depends_on:
      - livana-be
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  db_data:
  rabbitmq_data:
