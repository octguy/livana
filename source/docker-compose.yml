services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: livana-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: livana
      POSTGRES_USER: livana-user
      POSTGRES_PASSWORD: livana-pass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - livana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livana-user -d livana"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: livana-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"        # AMQP
      - "15672:15672" # Management UI
    networks:
      - livana-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot backend ─────────────────────────────────────────────────────
  livana-be:
    build:
      context: ./livana-be
      dockerfile: Dockerfile
    container_name: livana-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: 
      - .env                           # Main environment file (for VPS deployment)
      - ./livana-be/.env               # Backend-specific environment file (optional)
    environment:
      # Override .env values that must point to container names, not localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/livana
      SPRING_DATASOURCE_USERNAME: livana-user
      SPRING_DATASOURCE_PASSWORD: livana-pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    ports:
      - "8080:8080"
    networks:
      - livana-network

  # ─── React frontend (nginx) ──────────────────────────────────────────────────
  livana-fe:
    build:
      context: ./livana-fe
      dockerfile: Dockerfile
      args:
        # Don't set VITE_API_URL for docker deployments - use nginx proxy
        VITE_API_URL: ${VITE_API_URL}
    container_name: livana-fe
    restart: unless-stopped
    depends_on:
      - livana-be
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - livana-network

volumes:
  db_data:
  rabbitmq_data:

networks:
  livana-network:
    driver: bridge
