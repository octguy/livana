# ===================================================================
# Docker Compose Configuration for Production (VPS Deployment)
# ===================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Important:
#   1. Create .env file with all required secrets (see .env.example)
#   2. Update FRONTEND_URL and VITE_API_URL to your VPS domain/IP
#   3. Consider using a reverse proxy (nginx/Caddy) for SSL/TLS
#   4. Don't expose db/rabbitmq ports publicly in production
# ===================================================================

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: livana-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: livana
      POSTGRES_USER: livana-user
      POSTGRES_PASSWORD: livana-pass
    volumes:
      - db_data:/var/lib/postgresql/data
    # Don't expose to host in production (only accessible within docker network)
    # ports:
    #   - "5432:5432"
    networks:
      - livana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livana-user -d livana"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: livana-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # Only expose management UI if needed (consider removing in production)
    ports:
      - "127.0.0.1:15672:15672"  # Bind to localhost only
    networks:
      - livana-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot backend ─────────────────────────────────────────────────────
  livana-be:
    build:
      context: ./livana-be
      dockerfile: Dockerfile
    container_name: livana-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      # Override database and RabbitMQ hosts to use container names
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/livana
      SPRING_DATASOURCE_USERNAME: livana-user
      SPRING_DATASOURCE_PASSWORD: livana-pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    networks:
      - livana-network
    # Don't expose backend directly in production (nginx will proxy)
    # If not using nginx reverse proxy, uncomment:
    # ports:
    #   - "8080:8080"

  # ─── React frontend (nginx) ──────────────────────────────────────────────────
  livana-fe:
    build:
      context: ./livana-fe
      dockerfile: Dockerfile
      args:
        # Update this to your VPS domain or IP
        VITE_API_URL: ${VITE_API_URL}
    container_name: livana-fe
    restart: unless-stopped
    depends_on:
      - livana-be
    ports:
      - "80:80"    # HTTP
      # - "443:443"  # HTTPS (if you configure SSL in nginx)
    networks:
      - livana-network

volumes:
  db_data:
  rabbitmq_data:

networks:
  livana-network:
    driver: bridge
