services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: livana-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-livana}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-livana-user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-livana-pass}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-livana-user} -d ${POSTGRES_DB:-livana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: livana-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot backend ─────────────────────────────────────────────────────
  livana-be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livana-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Database — override URL so backend resolves the db container, not localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-livana}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-livana-user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-livana-pass}
      # JWT
      SPRING_JWT_SECRET_KEY: ${SPRING_JWT_SECRET_KEY}
      SPRING_JWT_SECRET_KEY_EXPIRATION: ${SPRING_JWT_SECRET_KEY_EXPIRATION}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION}
      RESET_PASSWORD_TOKEN_EXPIRATION: ${RESET_PASSWORD_TOKEN_EXPIRATION}
      VERIFICATION_CODE_EXPIRATION: ${VERIFICATION_CODE_EXPIRATION}
      # Mail
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      APP_PASSWORD: ${APP_PASSWORD}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER}
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # VNPay
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL}
      # Demo data
      SEED_DEMO_DATA: ${SEED_DEMO_DATA}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  db_data:
  rabbitmq_data:
